<!DOCTYPE html>
<html>
<head>
  <title>Contact</title>

  <!-- Optional nicer fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lora&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #f5f0ea;
      margin: 0;
      font-family: 'Lora', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 10px;
      color: #333;
    }

    p {
      margin: 10px 0 20px;
      color: #666;
    }

    .btn {
      display: inline-block;
      margin: 10px 5px;
      text-decoration: none;
      color: white;
      background-color: #333;
      padding: 12px 20px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #555;
    }

    .linkedin {
      background-color: #0077b5;
    }

    .linkedin:hover {
      background-color: #005582;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Contact</h1>
    <p>Feel free to reach out—I'd love to connect.</p>

    <a class="btn" href="mailto:rrusso@ithaca.edu?subject=Hello%20Ria">
      Email Me
    </a>

    <br>

    <a class="btn linkedin" href="https://www.linkedin.com" target="_blank">
      LinkedIn
    </a>

    <br><br>

    <a class="btn" href="index.html">
      ← Back Home
    </a>
  </div>

</body>
</html>
